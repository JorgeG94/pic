# Thanks to infinity to https://github.com/gha3mi/setup-fortran-conda
# for setting this up. MIT Licensed.
name: LFORTRAN CI

on:
  push:
    branches: [main]
  pull_request:

# LFortran is an alpha compiler and not a production target, so this whole
# workflow is allowed to go red without blocking merges (see continue-on-error
# on the job). It still runs the test suite so we can see regressions.

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  test_fpm:
    name: ${{ matrix.os }}_${{ matrix.compiler }}_fpm
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        compiler: [lfortran]
        include:
          - os: ubuntu-latest
            extra-packages: ""
          - os: windows-latest
            extra-packages: ""

    steps:
      - name: Setup Fortran
        uses: gha3mi/setup-fortran-conda@v0.17.1
        with:
          compiler: ${{ matrix.compiler }}
          platform: ${{ matrix.os }}
          extra-packages: ${{ matrix.extra-packages }}

      - name: fpm versioning
        run: fpm --version

      - name: Set linker if macOS
        if: matrix.os == 'macos-latest'
        run: echo "LFORTRAN_LINKER=clang" >> $GITHUB_ENV

      - name: fpm build (debug)
        run: fpm build --compiler ${{ matrix.compiler }} --profile debug --verbose --flag "--cpp --std=f23"

      - name: fpm test (debug)
        run: fpm test --compiler ${{ matrix.compiler }} --profile debug --verbose --flag "--cpp --std=f23"
