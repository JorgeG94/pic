# Thanks to infinity to https://github.com/gha3mi/setup-fortran-conda
# for setting this up. MIT Licensed.
name: LFORTRAN CI

on:
  push:
    branches: [main]
  pull_request:

# LFortran is an alpha compiler and not a production target, so both jobs are
# allowed to go red without blocking merges (continue-on-error). They still run
# the full test suite -- via both fpm and cmake, in release -- so we can see
# regressions. Release is used for cmake because a -g (debug) build needs
# llvm-dwarfdump to link the test executable, which is not always present.

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  test_fpm:
    name: ${{ matrix.os }}_${{ matrix.compiler }}_fpm
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        compiler: [lfortran]

    steps:
      - name: Setup Fortran
        uses: gha3mi/setup-fortran-conda@v0.17.1
        with:
          compiler: ${{ matrix.compiler }}
          platform: ${{ matrix.os }}

      - name: fpm versioning
        run: fpm --version

      - name: Set linker if macOS
        if: matrix.os == 'macos-latest'
        run: echo "LFORTRAN_LINKER=clang" >> $GITHUB_ENV

      - name: fpm build (release)
        run: fpm build --compiler ${{ matrix.compiler }} --profile release --verbose --flag "--cpp --std=f23"

      - name: fpm test (release)
        run: fpm test --compiler ${{ matrix.compiler }} --profile release --verbose --flag "--cpp --std=f23"

  test_cmake:
    name: ${{ matrix.os }}_${{ matrix.compiler }}_cmake
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        compiler: [lfortran]

    steps:
      - name: Setup Fortran
        uses: gha3mi/setup-fortran-conda@v0.17.1
        with:
          compiler: ${{ matrix.compiler }}
          platform: ${{ matrix.os }}
          extra-packages: "cmake, ninja"

      # Release avoids the -g debug info step that requires llvm-dwarfdump.
      - name: cmake test (release)
        run: |
          cmake -S . -B build/release -DTESTDRIVE_WITH_XDP=OFF -DCMAKE_BUILD_TYPE=Release -DCMAKE_Fortran_COMPILER=${{ matrix.compiler }} -G Ninja
          cmake --build build/release
          ctest --test-dir build/release --output-on-failure
