# Thanks to infinity to https://github.com/gha3mi/setup-fortran-conda
# for setting this up. MIT Licensed.
name: Setup Fortran multi OS multi compiler Conda CI/CD

# Run on every branch push for fast developer feedback, and on PRs. The
# concurrency group is keyed by branch name (head_ref on PRs, ref_name on
# pushes) so a push to a branch that already has an open PR collapses into a
# single run instead of building twice.
on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:

  # Run FPM tests on all OS/compiler combinations. PIC is pure Fortran (no
  # MPI/BLAS in this workflow), so the only combos we skip are the ones that
  # simply do not exist upstream:
  #   - ifx has no macOS build
  #   - LLVM flang-new has no conda-forge package on macOS
  #   - LLVM flang-new is not ready on Windows
  test_fpm:
    name: ${{ matrix.os }}_${{ matrix.compiler }}_fpm
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        compiler: [gfortran, ifx, flang-new]
        exclude:
          - os: macos-latest
            compiler: ifx
          - os: macos-latest
            compiler: flang-new
          - os: windows-latest
            compiler: flang-new

    steps:
      - name: Setup Fortran
        uses: gha3mi/setup-fortran-conda@v0.17.1
        with:
          compiler: ${{ matrix.compiler }}
          platform: ${{ matrix.os }}

      - name: fpm versioning
        run: fpm --version

      - name: fpm test (release)
        run: fpm test --compiler ${{ matrix.compiler }} --profile release --verbose

  # Run CMake + Ninja build/tests across the same OS/compiler matrix.
  test_cmake:
    name: ${{ matrix.os }}_${{ matrix.compiler }}_cmake
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        compiler: [gfortran, ifx, flang-new]
        exclude:
          - os: macos-latest
            compiler: ifx
          - os: macos-latest
            compiler: flang-new
          - os: windows-latest
            compiler: flang-new

    steps:
      - name: Setup Fortran
        uses: gha3mi/setup-fortran-conda@v0.17.1
        with:
          compiler: ${{ matrix.compiler }}
          platform: ${{ matrix.os }}
          extra-packages: "cmake, ninja"

      - name: cmake test (release)
        run: |
          cmake -S . -B build/release -DTESTDRIVE_WITH_XDP=OFF -DCMAKE_BUILD_TYPE=Release -DCMAKE_Fortran_COMPILER=${{ matrix.compiler }} -G Ninja
          cmake --build build/release
          ctest --test-dir build/release --output-on-failure
