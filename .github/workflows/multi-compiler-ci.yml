name: linux-multi-compiler-ci-blas-openmp

# Run on every branch push for fast developer feedback, and on PRs. The
# concurrency group is keyed by branch name (head_ref on PRs, ref_name on
# pushes) so a push to a branch that already has an open PR collapses into a
# single run instead of building twice.
on:
  push:
  pull_request:
  # Weekly run to catch compiler/toolchain/dependency drift even with no code
  # changes. 12:00 UTC Wednesday = 22:00 Sydney (AEST); drifts to 23:00 during
  # AEDT since GitHub cron cannot follow daylight saving. Scheduled runs fire
  # only on the default branch.
  schedule:
    - cron: '0 12 * * 3'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  Build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        toolchain:
          - {compiler: gcc, version: 10}
          - {compiler: gcc, version: 11}
          - {compiler: gcc, version: 12}
          - {compiler: gcc, version: 13}
          - {compiler: gcc, version: 14}
          - {compiler: gcc, version: 15}
          - {compiler: intel-classic, version: '2021.10'}
          - {compiler: intel, version: '2024.1'}
          - {compiler: intel, version: '2025.0'}
          - {compiler: nvidia-hpc, version: 'latest'}
          - {compiler: aocc, version: '5.1.0'}
        build: [cmake]
    env:
      BUILD_DIR: ${{ matrix.build == 'cmake' && 'build' || '.' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.x
      uses: actions/setup-python@v5 # Use pip to install latest CMake, & FORD/Jin2For, etc.
      with:
        python-version: 3.x

    - name: Install fypp
      run: pip install --upgrade fypp ninja


    - name: Setup Fortran compiler
      uses: fortran-lang/setup-fortran@v1.9.0
      id: setup-fortran
      with:
        compiler: ${{ matrix.toolchain.compiler }}
        version: ${{ matrix.toolchain.version }}

    - name: Configure with CMake
      if: ${{ contains(matrix.build, 'cmake') }}
      run: >-
        cmake -G Ninja
        -DCMAKE_BUILD_TYPE=Release
        -DPIC_ENABLE_OMP=ON
        -S . -B ${{ env.BUILD_DIR }}

    - name: Build and compile
      if: ${{ contains(matrix.build, 'cmake') }}
      run: cmake --build ${{ env.BUILD_DIR }} --parallel

    - name: catch build fail
      if: ${{ failure() && contains(matrix.build, 'cmake') }}
      run: cmake --build ${{ env.BUILD_DIR }} --verbose --parallel 1

    - name: test
      if: ${{ contains(matrix.build, 'cmake') }}
      run: >-
        ctest
        -V
        --test-dir ${{ env.BUILD_DIR }}
        --parallel
        --output-on-failure
        --no-tests=error
