codecov:
  notify:
    # Post reports as soon as the upload arrives instead of holding them
    # pending until codecov reads CI completion back from GitHub.
    wait_for_ci: false
  # Don't gate the codecov status on other CI checks passing.
  require_ci_to_pass: false

coverage:
  status:
    project:
      default:
        # Allow coverage to drop by up to 5% before failing
        threshold: 1%
    patch:
      default:
        # Require new code to have at least 85% coverage
        target: 90%

comment:
  # Still show coverage report in PR comments
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
