name = "pic"
version = "0.2.1"
license = "MIT"
author = "JorgeG94"
maintainer = "jorgegalvez1694@gmail.com"
copyright = "Copyright 2024, JorgeG94"
description = "A collection of commonly used features implemented in Fortran with portability in mind"
homepage = "https://jorgeg94.github.io/pic/"

[preprocess]
[preprocess.cpp]
suffixes = ["F90", "f90"]

[library]
source-dir = "src"
type = "static"

[build]
auto-tests = false
module-naming = false

[[test]]
name = "pic"
source-dir = "test"
main = "main_tests.f90"

[install]
library = true

[fortran]
implicit-typing = true
implicit-external = true
source-form = "free"

[dependencies]
test-drive.git = "https://github.com/fortran-lang/test-drive"

[extra.fortitude.check]
select = ["C", "E", "S"]
ignore = ["C003", "C072"]
line-length = 178
extend-exclude = ["test"]
